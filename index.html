<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#22a366" />

  <!-- Favicon & icons -->
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="shortcut icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <meta name="msapplication-TileImage" content="/logo.png" />

  <!-- Primary SEO -->
  <title>Filesterr — Free File Sharing with Download Analytics</title>
  <meta name="description" content="Share any file in seconds. See exactly who downloads it — country, device, bot or real person. 200MB free, no signup. Upgrade for 50GB, analytics & more." />
  <meta name="keywords" content="free file sharing, file upload, download analytics, visitor tracking, anonymous file sharing, secure file transfer, share large files" />
  <link rel="canonical" href="https://filesterr.com" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://filesterr.com" />
  <meta property="og:title" content="Filesterr — Free File Sharing with Download Analytics" />
  <meta property="og:description" content="Upload any file. Share a link. See who downloads it — country, device, bot or human. 200MB free, no account needed." />
  <meta property="og:image" content="https://filesterr.com/logo.png" />
  <meta property="og:site_name" content="Filesterr" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Filesterr — Free File Sharing with Download Analytics" />
  <meta name="twitter:description" content="Upload any file. Share a link. See who downloads it — real-time analytics, bot detection, no signup needed." />
  <meta name="twitter:image" content="https://filesterr.com/logo.png" />


  <!-- ADNETWORKS -->
  <meta name="monetag" content="8f79bf3e92a43d5e63b85015abbede7c">
  <meta name='admaven-placement' content=Bqjs8pjY8>
  <meta name="d6876fb05c53b035a580f50ced369ce30950c833" content="d6876fb05c53b035a580f50ced369ce30950c833" />

  <!-- Theme init — before Vue mounts to prevent flash -->
  <script>
    (function(){
      var s=localStorage.getItem('theme');
      var d=window.matchMedia('(prefers-color-scheme: dark)').matches;
      if(s==='dark'||(s===null&&d)) document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Style sheet -->
   <link rel="stylesheet" href="src/style.css"> 

  <!-- Cloudflare Turnstile — loaded on demand by UploadWidget -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <!--app-head-->
</head>
<body>
  <div id="app"><!--app-html--></div>
  <script type="module" src="/src/entry-client.js"></script>
</body>
</html>
