<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#22a366" />

  <!-- Primary SEO -->
  <title>Filesterr — Share Files Instantly. Track Every Download.</title>
  <meta name="description" content="Upload any file. Get a link in seconds. See who downloads it, where they're from, and whether they're real — with bot & proxy detection. 10GB free." />
  <meta name="keywords" content="file sharing, file upload, download analytics, visitor tracking, anonymous file sharing, secure file transfer" />
  <link rel="canonical" href="https://filesterr.com" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://filesterr.com" />
  <meta property="og:title" content="Filesterr — Share Files Instantly. Track Every Download." />
  <meta property="og:description" content="Upload any file. Get a link in seconds. See who downloads it, where they're from, and whether they're real. 10GB free, no credit card." />
  <meta property="og:image" content="https://filesterr.com/og.png" />
  <meta property="og:site_name" content="Filesterr" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Filesterr — Share Files Instantly. Track Every Download." />
  <meta name="twitter:description" content="Upload any file. Get a link in seconds. See who downloads it, where they're from, and whether they're real. 10GB free." />
  <meta name="twitter:image" content="https://filesterr.com/og.png" />

  <!-- Theme init — before Vue mounts to prevent flash -->
  <script>
    (function(){
      var s=localStorage.getItem('theme');
      var d=window.matchMedia('(prefers-color-scheme: dark)').matches;
      if(s==='dark'||(s===null&&d)) document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Style sheet -->
   <link rel="stylesheet" href="src/style.css"> 

  <!--app-head-->
</head>
<body>
  <div id="app"><!--app-html--></div>
  <script type="module" src="/src/entry-client.js"></script>
</body>
</html>
