# ─────────────────────────────────────────────────────────────────────────────
# Filesterr — Netlify deployment config
# Frontend (Vue 3 SSR) is deployed here.
# Django backend is deployed separately (Railway / Render / Fly.io).
# Set DJANGO_API_URL in Netlify → Site configuration → Environment variables.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # DJANGO_API_URL ortam değişkeni olarak Netlify'da ayarlanmalı.
  # Örnek: https://filesterr-api.onrender.com
  command = "npm run build && node scripts/gen-redirects.mjs"
  publish = "dist/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── Functions bundler ─────────────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"
  # Include the Vite-built SSR bundle and the HTML template
  included_files = ["dist/server/**", "dist/client/index.html", "dist/client/sitemap.xml", "dist/client/robots.txt", "dist/client/logo.png", "dist/client/favicon.ico", "dist/client/favicon.svg", "dist/client/linksterr.ico"]

# ── Proxy: /api/* → Django backend ───────────────────────────────────────────
# Gerçek redirect'ler scripts/gen-redirects.mjs tarafından dist/client/_redirects
# dosyasına yazılır (build zamanında). DJANGO_API_URL env var'ından okunur.
# Netlify toml [[redirects]] env var substitution'ı desteklemez.

# ── Redirect'ler ─────────────────────────────────────────────────────────────
# Tüm redirect kuralları scripts/gen-redirects.mjs tarafından build zamanında
# dist/client/_redirects dosyasına yazılır.
# _redirects, netlify.toml redirect bloklarından önce uygulanır.

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
