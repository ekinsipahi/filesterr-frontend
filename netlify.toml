# ─────────────────────────────────────────────────────────────────────────────
# Filesterr — Netlify deployment config
# Frontend (Vue 3 SSR) is deployed here.
# Django backend is deployed separately (Railway / Render / Fly.io).
# Set DJANGO_API_URL in Netlify → Site configuration → Environment variables.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist/client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── Functions bundler ─────────────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"
  # Include the Vite-built SSR bundle and the HTML template
  included_files = ["dist/server/**", "dist/client/index.html"]

# ── Proxy: /api/* → Django backend ───────────────────────────────────────────
# DJANGO_API_URL örn: https://filesterr-api.railway.app
[[redirects]]
  from   = "/api/*"
  to     = "{{DJANGO_API_URL}}/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/media/*"
  to     = "{{DJANGO_API_URL}}/media/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/admin/*"
  to     = "{{DJANGO_API_URL}}/admin/:splat"
  status = 200
  force  = true

# ── Static assets — served directly from CDN (no function needed) ─────────────
[[redirects]]
  from   = "/assets/*"
  to     = "/assets/:splat"
  status = 200

# ── Everything else → SSR function ───────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/ssr"
  status = 200
  force  = true

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
